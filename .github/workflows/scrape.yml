name: Scrape MMI Data

on:
  schedule:
    - cron: '0 * * * *' # Runs at the start of every hour
  workflow_dispatch: # Allows manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important for pushing changes

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run scraper
      env:
        FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
      run: python scrape.py

    - name: Commit README changes (daily only)
      if: github.event.schedule == '0 0 * * *' || github.event_name == 'workflow_dispatch'
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Update MMI README badge"
        file_pattern: "README.md"